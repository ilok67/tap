<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تست لحظه‌ای آی‌پی کلادفلر</title>
    <style>
        body { font-family: monospace; direction: ltr; background: #111; color: #0f0; padding: 20px; }
        .good { background: #0a3a0a; color: #0f0; }
        .bad { background: #3a0a0a; color: #f99; }
        .row { padding: 4px; margin: 2px; border-radius: 4px; }
    </style>
</head>
<body>
<h2>تست .لحظه‌ای (هر نتیجه به محض دریافت)</h2>
<div id="log">⏳ در حال تست...</div>

<script>
    // لیست آی‌پی‌ها (چندتا نمونه)
    const ips = [
        "188.114.96.1", "1.1.1.1", "8.8.8.8", "104.16.0.1", "192.0.2.1"
    ];

    const logDiv = document.getElementById('log');

    function testOneIp(ip) {
        const start = performance.now();
        const url = `http://${ip}/cdn-cgi/trace`;
        // mode: 'no-cors' برای دور زدن CORS ولی دریافت نکردن محتوا
        fetch(url, { mode: 'no-cors' })
            .then(() => {
                const latency = Math.round(performance.now() - start);
                showResult(ip, latency, true);
            })
            .catch(() => {
                showResult(ip, null, false);
            });
    }

    function showResult(ip, latency, isGood) {
        const line = document.createElement('div');
        line.className = `row ${isGood ? 'good' : 'bad'}`;
        line.innerText = `${ip}  →  ${isGood ? `✅ پاسخ در ${latency} ms` : '❌ بدون پاسخ'}`;
        logDiv.appendChild(line);
        // اسکرول خودکار به انتها
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // اجرای تست روی همه آی‌پی‌ها (به صورت موازی یا ترتیبی؟ برای لحظه‌ای بودن، ترتیبی بهتر است)
    async function runAll() {
        logDiv.innerHTML = ''; // پاک کردن قبلی
        for (let ip of ips) {
            await testOneIp(ip); // صبر می‌کنیم تا یکی تمام شود بعد برویم سراغ بعدی
            // برای اینکه همزمان تست شوند (سریعتر) می‌توانید از Promise.all استفاده کنید، ولی خروجی به ترتیب نیست
        }
        logDiv.innerHTML += '<br>🏁 تست تمام شد.';
    }

    runAll();
</script>
</body>
</html>
